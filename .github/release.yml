changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - docs
    - title: Internal
      labels:
        - chore
        - ci
  exclude:
    labels:
      - skip-changelog
  template: |
    ## Draton Early Tooling Preview

    Pick the archive for your platform from the assets below, extract it, add the extracted directory to `PATH`, then run:

    ```sh
    drat --version
    drat run examples/hello.dt
    cd examples/early-preview/hello-app
    drat task
    drat task build
    ```

    Install and preview docs:

    - `docs/install.md`
    - `docs/quickstart.md`
    - `docs/early-preview.md`

    Current supported preview targets:

    - Linux x86_64
    - Linux aarch64
    - macOS x86_64
    - macOS aarch64
    - Windows x86_64

    Current blocked target:

    - Windows aarch64

    Full install instructions, checksum verification, and platform-specific troubleshooting are documented in `docs/install.md`.
