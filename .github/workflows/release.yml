name: early-preview-release

on:
  push:
    tags:
      - "v0.*"
      - "early-*"

permissions:
  contents: write

jobs:
  test:
    name: release-verification
    runs-on: ubuntu-22.04
    env:
      DRATON_DISABLE_GCROOT: "1"
      DRATON_ALLOW_MULTIPLE_RUNTIME_DEFS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 14
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0.0"

      - name: Configure LLVM environment
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=$LLVM_PATH" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config" >> "$GITHUB_ENV"
          echo "$LLVM_PATH/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run focused test suite
        run: |
          cargo test -p draton-parser --test items
          cargo test -p draton-typeck --test errors
          cargo test -p drat --test strict_syntax --test tooling_suite
          cargo test -p draton-lsp --test server

      - name: Enforce self-host strict subset
        run: python3 tools/check_selfhost_strict_subset.py

      - name: Verify early preview commands
        run: |
          cargo run -p drat -- fmt --check examples/hello.dt tests/programs/compile/52_lambda_nested.dt
          cargo run -p drat -- lint examples/early-preview/hello-app/src
          cargo run -p drat -- task
          cargo run -p drat -- build --strict-syntax examples/hello.dt -o /tmp/draton_release_strict
          /tmp/draton_release_strict
          cargo run -p drat -- build src/main.dt -o /tmp/draton_release_bootstrap

  build:
    name: ${{ matrix.label }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: draton-early-linux-x86_64.tar.gz
            binary: drat
            python: "3.11"
            llvm_source: ubuntu-apt
            supported: true
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: draton-early-linux-aarch64.tar.gz
            binary: drat
            python: "3.11"
            llvm_source: ubuntu-apt
            supported: true
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact: draton-early-macos-x86_64.tar.gz
            binary: drat
            python: "3.11"
            llvm_source: install-llvm-action
            supported: true
          - label: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact: draton-early-macos-aarch64.tar.gz
            binary: drat
            python: "3.11"
            llvm_source: install-llvm-action
            supported: true
          - label: windows-x86_64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: draton-early-windows-x86_64.zip
            binary: drat.exe
            python: "3.11"
            llvm_source: llvm-package-windows
            supported: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        if: ${{ matrix.supported }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM 14 (Linux)
        if: ${{ matrix.supported && matrix.llvm_source == 'ubuntu-apt' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14-dev clang-14 lld-14
          if [ -f "/usr/lib/llvm-14/bin/llvm-config" ]; then
            sudo mv /usr/lib/llvm-14/bin/llvm-config /usr/lib/llvm-14/bin/llvm-config-real
          fi
          rustc scripts/llvm_config_shim.rs -O -o /tmp/llvm-config
          sudo mv /tmp/llvm-config /usr/lib/llvm-14/bin/llvm-config
          echo "LLVM_PATH=/usr/lib/llvm-14" >> "$GITHUB_ENV"

      - name: Install LLVM 14 (macOS)
        if: ${{ matrix.supported && matrix.llvm_source == 'install-llvm-action' }}
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0.6"

      - name: Install LLVM 14 (Windows)
        if: ${{ matrix.supported && matrix.llvm_source == 'llvm-package-windows' }}
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $installer = Join-Path $env:GITHUB_WORKSPACE 'llvm-installer.exe'
          Invoke-WebRequest -Uri 'https://github.com/llvm/llvm-project/releases/download/llvmorg-14.0.6/LLVM-14.0.6-win64.exe' -OutFile $installer
          $extractRoot = Join-Path $env:RUNNER_TEMP 'llvm-src'
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          & 7z x $installer "-o$extractRoot" | Out-Null
          $header = Get-ChildItem -Path $extractRoot -Recurse -Filter 'Target.h' |
            Where-Object { $_.FullName -like '*\include\llvm-c\Target.h' } |
            Select-Object -First 1
          if (-not $header) {
            throw 'Could not locate llvm-c/Target.h in extracted LLVM payload'
          }
          $prefix = $header.Directory.Parent.Parent.FullName
          $dest = (Join-Path $env:GITHUB_WORKSPACE 'llvm').Replace('/', '\')
          if (Test-Path $dest) {
            Remove-Item -Recurse -Force $dest
          }
          Copy-Item -Recurse -Force $prefix $dest
          $header = Join-Path $dest 'include\llvm-c\Target.h'
          if (-not (Test-Path $header)) {
            throw "LLVM headers missing after install: $header"
          }
          $realConfig = Join-Path $dest 'bin\llvm-config.exe'
          if (Test-Path $realConfig) {
            Rename-Item -Path $realConfig -NewName 'llvm-config-real.exe'
          }
          rustc scripts/llvm_config_shim.rs -O -o (Join-Path $dest 'bin\llvm-config.exe')
          "LLVM_PATH=$dest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure LLVM environment
        if: ${{ matrix.supported }}
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=$LLVM_PATH" >> "$GITHUB_ENV"
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config.exe" >> "$GITHUB_ENV"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config" >> "$GITHUB_ENV"
            echo "DYLD_LIBRARY_PATH=" >> "$GITHUB_ENV"
            echo "LD_LIBRARY_PATH=" >> "$GITHUB_ENV"
          else
            echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config" >> "$GITHUB_ENV"
          fi
          echo "$LLVM_PATH/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        if: ${{ matrix.supported }}
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        if: ${{ matrix.supported }}
        run: cargo build --release --locked -p drat -p draton-runtime -p draton-lsp --target ${{ matrix.target }}

      - name: Package release archive
        if: ${{ matrix.supported }}
        run: >
          python scripts/package_release.py
          --binary target/${{ matrix.target }}/release/${{ matrix.binary }}
          --artifact ${{ matrix.artifact }}
          --out-dir dist

      - name: Smoke test packaged archive
        if: ${{ matrix.supported }}
        run: python scripts/smoke_release.py --archive dist/${{ matrix.artifact }}

      - name: Upload packaged artifact
        if: ${{ matrix.supported }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
          cp docs/release-notes-early-preview.md release-assets/RELEASE-NOTES-EARLY-PREVIEW.md

      - name: Generate checksums for all release assets
        run: |
          cd release-assets
          python3 - <<'PY'
          from pathlib import Path
          import hashlib

          files = sorted(
              p for p in Path(".").iterdir()
              if p.is_file() and p.name != "SHA256SUMS.txt" and not p.name.endswith(".sha256")
          )
          lines = []
          for path in files:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              checksum = digest.hexdigest()
              lines.append(f"{checksum}  {path.name}")
              Path(f"{path.name}.sha256").write_text(
                  f"{checksum}  {path.name}\n",
                  encoding="utf-8",
              )
          Path("SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/release-notes-early-preview.md
          files: |
            release-assets/draton-early-linux-x86_64.tar.gz
            release-assets/draton-early-linux-x86_64.tar.gz.sha256
            release-assets/draton-early-linux-aarch64.tar.gz
            release-assets/draton-early-linux-aarch64.tar.gz.sha256
            release-assets/draton-early-macos-x86_64.tar.gz
            release-assets/draton-early-macos-x86_64.tar.gz.sha256
            release-assets/draton-early-macos-aarch64.tar.gz
            release-assets/draton-early-macos-aarch64.tar.gz.sha256
            release-assets/draton-early-windows-x86_64.zip
            release-assets/draton-early-windows-x86_64.zip.sha256
            release-assets/install.sh
            release-assets/install.sh.sha256
            release-assets/install.ps1
            release-assets/install.ps1.sha256
            release-assets/RELEASE-NOTES-EARLY-PREVIEW.md
            release-assets/RELEASE-NOTES-EARLY-PREVIEW.md.sha256
            release-assets/SHA256SUMS.txt
