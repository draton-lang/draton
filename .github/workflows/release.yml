name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 14
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0.6"

      - name: Configure LLVM environment
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=$LLVM_PATH" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config" >> "$GITHUB_ENV"
          echo "$LLVM_PATH/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace --locked

      - name: Build drat and packaged runtime
        run: cargo build --locked -p drat -p draton-runtime

  build:
    name: ${{ matrix.artifact }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: draton-linux-x86_64.tar.gz
            binary: drat
            python: "3.11"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: draton-linux-aarch64.tar.gz
            binary: drat
            python: "3.11"
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: draton-macos-x86_64.tar.gz
            binary: drat
            python: "3.11"
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact: draton-macos-aarch64.tar.gz
            binary: drat
            python: "3.11"
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: draton-windows-x86_64.zip
            binary: drat.exe
            python: "3.11"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM 14
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0.6"

      - name: Configure LLVM environment
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=$LLVM_PATH" >> "$GITHUB_ENV"
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config.exe" >> "$GITHUB_ENV"
          else
            echo "LLVM_CONFIG_PATH=$LLVM_PATH/bin/llvm-config" >> "$GITHUB_ENV"
          fi
          echo "$LLVM_PATH/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p drat -p draton-runtime --target ${{ matrix.target }}

      - name: Package release archive
        run: >
          python scripts/package_release.py
          --binary target/${{ matrix.target }}/release/${{ matrix.binary }}
          --artifact ${{ matrix.artifact }}
          --out-dir dist

      - name: Smoke test packaged archive
        run: python scripts/smoke_release.py --archive dist/${{ matrix.artifact }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;

      - name: Generate SHA256SUMS.txt
        run: |
          cd release-assets
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          archives = sorted(
              p for p in Path(".").iterdir()
              if p.suffix == ".zip" or p.name.endswith(".tar.gz")
          )
          lines = []
          for path in archives:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              lines.append(f"{digest.hexdigest()}  {path.name}")
          Path("SHA256SUMS.txt").write_text("\\n".join(lines) + "\\n", encoding="utf-8")
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/draton-linux-x86_64.tar.gz
            release-assets/draton-linux-x86_64.tar.gz.sha256
            release-assets/draton-linux-aarch64.tar.gz
            release-assets/draton-linux-aarch64.tar.gz.sha256
            release-assets/draton-macos-x86_64.tar.gz
            release-assets/draton-macos-x86_64.tar.gz.sha256
            release-assets/draton-macos-aarch64.tar.gz
            release-assets/draton-macos-aarch64.tar.gz.sha256
            release-assets/draton-windows-x86_64.zip
            release-assets/draton-windows-x86_64.zip.sha256
            release-assets/SHA256SUMS.txt
