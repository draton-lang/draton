name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  LLVM_VERSION: "14"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: drat-linux-x86_64
            llvm_pkg: llvm-14-dev
            mode: native-linux

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact: drat-linux-x86_64-musl
            mode: alpine-musl

          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: drat-linux-arm64
            llvm_pkg: llvm-14-dev
            mode: native-linux

          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: drat-macos-x86_64
            llvm_pkg: llvm@14
            mode: native-macos

          - os: macos-15
            target: aarch64-apple-darwin
            artifact: drat-macos-arm64
            llvm_pkg: llvm@14
            mode: native-macos

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: drat-windows-x86_64
            ext: .exe
            mode: native-windows
            llvm_source: vovkos_archive
            llvm_archive: https://github.com/vovkos/llvm-package-windows/releases/download/llvm-14.0.6/llvm-14.0.6-windows-amd64-msvc17-libcmt.7z

          - os: ubuntu-22.04
            target: riscv64gc-unknown-linux-gnu
            artifact: drat-linux-riscv64
            mode: qemu-riscv64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM (Linux)
        if: matrix.mode == 'native-linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_VERSION }}
          sudo apt-get install -y ${{ matrix.llvm_pkg }} libpolly-14-dev libzstd-dev
          echo "LLVM_SYS_140_PREFIX=/usr/lib/llvm-14" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=/usr/lib/llvm-14/bin/llvm-config" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-14/bin" >> "$GITHUB_PATH"

      - name: Install LLVM (macOS)
        if: matrix.mode == 'native-macos'
        run: |
          brew install ${{ matrix.llvm_pkg }}
          echo "LLVM_SYS_140_PREFIX=$(brew --prefix ${{ matrix.llvm_pkg }})" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$(brew --prefix ${{ matrix.llvm_pkg }})/bin/llvm-config" >> "$GITHUB_ENV"
          echo "$(brew --prefix ${{ matrix.llvm_pkg }})/bin" >> "$GITHUB_PATH"

      - name: Install LLVM (Windows)
        if: matrix.mode == 'native-windows'
        shell: pwsh
        run: |
          if (Test-Path C:\llvm-download) {
            Remove-Item -Recurse -Force C:\llvm-download
          }
          if (Test-Path C:\llvm-pkg) {
            Remove-Item -Recurse -Force C:\llvm-pkg
          }
          New-Item -ItemType Directory -Force -Path C:\llvm-download | Out-Null
          Invoke-WebRequest -Uri "${{ matrix.llvm_archive }}" -OutFile C:\llvm-download\llvm.7z
          & "C:\Program Files\7-Zip\7z.exe" x C:\llvm-download\llvm.7z -oC:\llvm-pkg -y
          $llvmRoot = Get-ChildItem C:\llvm-pkg | Select-Object -First 1 -ExpandProperty FullName
          "int __draton_xml2_stub(void) { return 0; }" | Set-Content -Path C:\llvm-download\xml2_stub.c -Encoding ascii
          & "$llvmRoot\bin\clang.exe" -c C:\llvm-download\xml2_stub.c -o C:\llvm-download\xml2_stub.obj
          & "$llvmRoot\bin\llvm-lib.exe" /nologo /out:"$llvmRoot\lib\xml2s.lib" C:\llvm-download\xml2_stub.obj
          echo "LLVM_SYS_140_PREFIX=$llvmRoot" >> $env:GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$llvmRoot\bin\llvm-config.exe" >> $env:GITHUB_ENV
          echo "$llvmRoot\bin" >> $env:GITHUB_PATH

      - name: Set up QEMU
        if: matrix.mode == 'qemu-riscv64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Setup Rust
        if: startsWith(matrix.mode, 'native-')
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        if: startsWith(matrix.mode, 'native-')
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (native)
        if: startsWith(matrix.mode, 'native-')
        run: cargo build --release --package drat --target ${{ matrix.target }}
        env:
          CARGO_TARGET_DIR: target

      - name: Build (musl in Alpine)
        if: matrix.mode == 'alpine-musl'
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$PWD":"$PWD" \
            -v "$PWD/dist":/out \
            -w "$PWD" \
            -e CARGO_TERM_COLOR="${CARGO_TERM_COLOR}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            alpine:3.19 \
            /bin/sh -lc '
              set -eux
              apk add --no-cache \
                bash \
                build-base \
                curl \
                git \
                linux-headers \
                llvm14 \
                llvm14-dev \
                llvm14-static \
                lld \
                python3 \
                zlib-dev \
                zstd-dev
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
              . "$HOME/.cargo/env"
              rustup target add x86_64-unknown-linux-musl
              export LLVM_SYS_140_PREFIX=/usr/lib/llvm14
              export LLVM_CONFIG_PATH=/usr/bin/llvm14-config
              mkdir -p /opt/musl-compat
              printf "%s\n" "void __draton_musl_rt_stub(void) {}" > /tmp/rt_stub.c
              cc -c /tmp/rt_stub.c -o /tmp/rt_stub.o
              ar rcs /opt/musl-compat/librt.a /tmp/rt_stub.o
              export RUSTFLAGS="${RUSTFLAGS:-} -L native=/opt/musl-compat"
              cargo build --release --package drat --target x86_64-unknown-linux-musl
              test -f target/x86_64-unknown-linux-musl/release/drat
              ls -lh target/x86_64-unknown-linux-musl/release/drat
              strip target/x86_64-unknown-linux-musl/release/drat || true
              tar -czf /out/drat-linux-x86_64-musl.tar.gz -C target/x86_64-unknown-linux-musl/release drat
              sha256sum /out/drat-linux-x86_64-musl.tar.gz > /out/drat-linux-x86_64-musl.tar.gz.sha256
              chown -R "$HOST_UID:$HOST_GID" /out target
            '
          test -f dist/${{ matrix.artifact }}.tar.gz
          ls -lh dist/${{ matrix.artifact }}.tar.gz dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Build (riscv64 in Debian)
        if: matrix.mode == 'qemu-riscv64'
        run: |
          mkdir -p dist
          docker run --rm \
            --platform linux/riscv64 \
            -v "$PWD":"$PWD" \
            -v "$PWD/dist":/out \
            -w "$PWD" \
            -e CARGO_TERM_COLOR="${CARGO_TERM_COLOR}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            debian:unstable-slim \
            /bin/bash -lc '
              set -euxo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y \
                build-essential \
                ca-certificates \
                clang-14 \
                curl \
                git \
                libpolly-14-dev \
                libzstd-dev \
                llvm-14 \
                llvm-14-dev \
                pkg-config \
                python3 \
                zlib1g-dev
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
              . "$HOME/.cargo/env"
              rustup target add riscv64gc-unknown-linux-gnu
              export LLVM_SYS_140_PREFIX=/usr/lib/llvm-14
              export LLVM_CONFIG_PATH=/usr/lib/llvm-14/bin/llvm-config
              cargo build --release --package drat --target riscv64gc-unknown-linux-gnu
              test -f target/riscv64gc-unknown-linux-gnu/release/drat
              ls -lh target/riscv64gc-unknown-linux-gnu/release/drat
              strip target/riscv64gc-unknown-linux-gnu/release/drat || true
              tar -czf /out/drat-linux-riscv64.tar.gz -C target/riscv64gc-unknown-linux-gnu/release drat
              sha256sum /out/drat-linux-riscv64.tar.gz > /out/drat-linux-riscv64.tar.gz.sha256
              chown -R "$HOST_UID:$HOST_GID" /out target
            '
          test -f dist/${{ matrix.artifact }}.tar.gz
          ls -lh dist/${{ matrix.artifact }}.tar.gz dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Unix)
        if: startsWith(matrix.mode, 'native-') && runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/drat
          strip "$BIN" || true
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release drat
          sha256sum dist/${{ matrix.artifact }}.tar.gz > dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.mode == 'native-windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target\\${{ matrix.target }}\\release\\drat.exe"
          Compress-Archive -Path $bin -DestinationPath "dist\\${{ matrix.artifact }}.zip" -Force
          (
            (Get-FileHash "dist\\${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower() +
            "  ${{ matrix.artifact }}.zip"
          ) | Out-File "dist\\${{ matrix.artifact }}.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Get tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          cat > release_notes.md << EOF
          ## Draton $TAG

          ### Downloads

          | Platform | File |
          |----------|------|
          | Linux x86_64 (glibc) | \`drat-linux-x86_64.tar.gz\` |
          | Linux x86_64 (musl/static) | \`drat-linux-x86_64-musl.tar.gz\` |
          | Linux ARM64 | \`drat-linux-arm64.tar.gz\` |
          | Linux RISC-V 64 | \`drat-linux-riscv64.tar.gz\` |
          | macOS Intel | \`drat-macos-x86_64.tar.gz\` |
          | macOS Apple Silicon | \`drat-macos-arm64.tar.gz\` |
          | Windows x86_64 | \`drat-windows-x86_64.zip\` |

          ### Install (Linux/macOS)

          \`\`\`bash
          curl -L https://github.com/draton-lang/draton/releases/download/$TAG/drat-linux-x86_64.tar.gz | tar xz
          sudo mv drat /usr/local/bin/
          drat --version
          \`\`\`

          ### Verify checksum

          \`\`\`bash
          sha256sum -c drat-linux-x86_64.tar.gz.sha256
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Draton ${{ steps.tag.outputs.tag }}
          body_file: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          files: dist/**/*

  smoke-test:
    name: Smoke test ${{ matrix.artifact }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: drat-linux-x86_64
            ext: ""
          - os: macos-15
            artifact: drat-macos-arm64
            ext: ""
          - os: windows-2022
            artifact: drat-windows-x86_64
            ext: .exe

    steps:
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Extract (Unix)
        if: runner.os != 'Windows'
        run: tar -xzf ${{ matrix.artifact }}.tar.gz

      - name: Extract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Expand-Archive "${{ matrix.artifact }}.zip" .

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./drat${{ matrix.ext }} --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\\drat${{ matrix.ext }} --version
