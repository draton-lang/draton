name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-tests:
    name: rust-tests
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run focused parser/typecheck tests
        run: cargo test -p draton-parser --test items -p draton-typeck --test errors

  strict-syntax-smoke:
    name: strict-syntax-smoke
    needs: rust-tests
    runs-on: ubuntu-22.04
    env:
      DRATON_DISABLE_GCROOT: "1"
      DRATON_ALLOW_MULTIPLE_RUNTIME_DEFS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 14
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14 llvm-14-dev clang-14

      - name: Configure LLVM environment
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=/usr/lib/llvm-14" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=/usr/lib/llvm-14/bin/llvm-config" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-14/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Strict canonical fixture build
        run: cargo run -p drat -- build --strict-syntax examples/hello.dt -o /tmp/draton_strict_fixture

      - name: Run strict canonical fixture
        run: /tmp/draton_strict_fixture
